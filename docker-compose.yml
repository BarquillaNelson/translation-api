
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: translation-api:latest
    container_name: translation-api-app
    restart: unless-stopped
    env_file:
      - .env.local
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - translation-network

  web:
    image: nginx:alpine
    container_name: translation-api-web
    restart: unless-stopped
    env_file:
      - .env.local
    ports:
      - "8000:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/app.conf:/etc/nginx/conf.d/default.conf
    networks:
      - translation-network
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: translation-api-db
    restart: unless-stopped
    env_file:
      - .env.local
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_ALLOW_EMPTY_PASSWORD: 1
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - translation-network

networks:
  translation-network:
    driver: bridge

volumes:
  dbdata:
